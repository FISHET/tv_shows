plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

application {
    mainClass = 'Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "com.google.code.gson:gson:2.14.0"
    implementation "io.rest-assured:rest-assured:6.0.0"
}






